<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite OSINT War Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<style>
body {
    margin:0;
    font-family:Arial,sans-serif;
    background:#050505;
    color:#00ff00;
    overflow-x:hidden;
}

/* HEADER */
header {
    padding:10px;
    text-align:center;
    background:#111;
    border-bottom:2px solid #00ff00;
    font-size:24px;
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:1000;
}

/* DEFCON BAR */
#defcon-bar {
    width:100%;
    background:#111;
    border-bottom:2px solid #00ff00;
    padding:6px 0;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    position:sticky;
    top:40px;
    z-index:999;
}
.defcon-1 { color:#ff0000; animation:flash 0.5s infinite; }
.defcon-2 { color:#ff4500; animation:flash 1s infinite; }
.defcon-3 { color:#ffff00; }
.defcon-4 { color:#00ff00; }
.defcon-5 { color:#00bfff; }

/* MISSILE ALERT BAR */
#missile-alert {
    display:none;
    background:#8b0000;
    color:#ffffff;
    padding:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:3px solid red;
    position:sticky;
    top:72px;
    z-index:998;
}

/* TICKER */
#ticker {
    position:sticky;
    top:110px;
    width:100%;
    background:#000;
    color:red;
    overflow:hidden;
    white-space:nowrap;
    padding:8px 0;
    border-bottom:2px solid #222;
    z-index:997;
}
#ticker-content {
    display:inline-block;
    padding-left:100%;
    font-size:1rem;
    will-change:transform;
}
@keyframes flash {
    0% {opacity:1;}
    50% {opacity:0;}
    100% {opacity:1;}
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    grid-auto-rows:40vh;
    gap:8px;
    padding:150px 8px 8px 8px;
}

/* PANELS */
.panel {
    border:1px solid #00ff00;
    background:#000;
    position:relative;
    width:100%;
    height:100%;
}
iframe {
    width:100%;
    height:100%;
    border:none;
}

/* FULLSCREEN BUTTON */
.fullscreen-btn {
    position:absolute;
    top:5px;
    right:5px;
    background:#111;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:4px 8px;
    font-size:12px;
    cursor:pointer;
    z-index:5;
}

/* DROPDOWN */
.dropbtn {
    background-color:#111;
    color:#00ff00;
    padding:5px 10px;
    font-size:14px;
    border:1px solid #00ff00;
    cursor:pointer;
}
.dropdown {
    position:fixed;
    top:120px;
    left:10px;
    z-index:1100;
}
.dropdown-content {
    display:none;
    position:absolute;
    background-color:#111;
    min-width:160px;
    border:1px solid #00ff00;
    z-index:1100;
}
.dropdown-content a {
    color:#00ff00;
    padding:5px 10px;
    text-decoration:none;
    display:block;
}
.dropdown-content a:hover {
    background-color:#222;
}
.dropdown:hover .dropdown-content {
    display:block;
}
</style>
</head>

<body>

<header>🛰️ ELITE OSINT WAR ROOM</header>

<!-- DEFCON Indicator -->
<div id="defcon-bar">
    DEFCON Status: <span id="defcon-level" class="defcon-5">5 (Peace)</span>
</div>

<!-- Missile Launch Alert -->
<div id="missile-alert">
    ⚠️ POSSIBLE MISSILE LAUNCH DETECTED — CHECK OSINT FEEDS ⚠️
</div>

<!-- Ticker -->
<div id="ticker">
    <div id="ticker-content">Loading alerts…</div>
</div>

<!-- AUDIO -->
<audio id="alert-sound" src="https://www.soundjay.com/button/beep-07.mp3" preload="auto"></audio>
<audio id="live-sound" src="https://www.soundjay.com/button/beep-08b.mp3" preload="auto"></audio>

<!-- OPTIONS MENU -->
<div class="dropdown">
  <button class="dropbtn">Options ⚙️</button>
  <div class="dropdown-content">
    <a href="#" onclick="togglePanel('flights')">Flights</a>
    <a href="#" onclick="togglePanel('ships')">Ships</a>
    <a href="#" onclick="togglePanel('iran')">Iran War Map</a>
    <a href="#" onclick="togglePanel('osint')">OSINT Feed</a>
    <a href="#" onclick="togglePanel('cyber')">Cyber Threat Map</a>
    <a href="#" onclick="togglePanel('stocks')">Stocks</a>
    <a href="#" onclick="togglePanel('radio')">Radio/Emergency</a>
  </div>
</div>

<!-- GRID PANELS -->
<div class="grid" id="grid">

    <div class="panel" id="flights">
        <button class="fullscreen-btn" onclick="toggleFullscreen('flights')">⛶</button>
        <iframe src="https://globe.adsbexchange.com/"></iframe>
    </div>

    <div class="panel" id="ships">
        <button class="fullscreen-btn" onclick="toggleFullscreen('ships')">⛶</button>
        <iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:3"></iframe>
    </div>

    <div class="panel" id="stocks">
        <button class="fullscreen-btn" onclick="toggleFullscreen('stocks')">⛶</button>
        <iframe src="https://s.tradingview.com/widgetembed/?symbols=NASDAQ:AAPL,NYSE:TSLA,AMEX:SPY,FOREXCOM:SPXUSD&theme=dark"></iframe>
    </div>

    <div class="panel" id="iran">
        <button class="fullscreen-btn" onclick="toggleFullscreen('iran')">⛶</button>
        <iframe src="https://iranwarlive.com/"></iframe>
    </div>

    <div class="panel" id="osint">
        <button class="fullscreen-btn" onclick="toggleFullscreen('osint')">⛶</button>
        <iframe src="https://liveuamap.com/en/embed"></iframe>
    </div>

    <div class="panel" id="cyber">
        <button class="fullscreen-btn" onclick="toggleFullscreen('cyber')">⛶</button>
        <iframe src="https://threatmap.checkpoint.com/"></iframe>
    </div>

    <div class="panel" id="radio">
        <button class="fullscreen-btn" onclick="toggleFullscreen('radio')">⛶</button>
        <iframe src="https://www.broadcastify.com/listen/"></iframe>
    </div>

</div>

<script>
// DRAG & RESIZE
interact('.panel')
  .draggable({
      inertia:true,
      modifiers:[interact.modifiers.restrictRect({restriction:'parent', endOnly:true})],
      listeners:{move:dragMoveListener}
  })
  .resizable({
      edges:{left:true,right:true,bottom:true,top:true},
      inertia:true
  })
  .on('resizemove', function(event){
      let {x,y}=event.target.dataset;
      x=parseFloat(x)||0; y=parseFloat(y)||0;
      Object.assign(event.target.style,{
          width:event.rect.width+'px',
          height:event.rect.height+'px',
          transform:`translate(${x}px,${y}px)`
      });
  });

function dragMoveListener(event){
  const target=event.target;
  const x=(parseFloat(target.dataset.x)||0)+event.dx;
  const y=(parseFloat(target.dataset.y)||0)+event.dy;
  target.style.transform=`translate(${x}px,${y}px)`;
  target.dataset.x=x; target.dataset.y=y;
}

// FULLSCREEN
let fullscreenPanel=null;
function toggleFullscreen(panelId){
    const panel=document.getElementById(panelId);
    if(fullscreenPanel===panel){
        panel.style.position='';
        panel.style.top='';
        panel.style.left='';
        panel.style.width='';
        panel.style.height='';
        panel.style.zIndex='';
        fullscreenPanel=null;
    } else {
        if(fullscreenPanel){
            fullscreenPanel.style.position='';
            fullscreenPanel.style.top='';
            fullscreenPanel.style.left='';
            fullscreenPanel.style.width='';
            fullscreenPanel.style.height='';
            fullscreenPanel.style.zIndex='';
        }
        panel.style.position='fixed';
        panel.style.top='0';
        panel.style.left='0';
        panel.style.width='100%';
        panel.style.height='100%';
        panel.style.zIndex='999';
        fullscreenPanel=panel;
    }
}

// PANEL TOGGLE
function togglePanel(panelId){
    const panel=document.getElementById(panelId);
    panel.style.display=(panel.style.display==='none')?'block':'none';
}

// DEFCON CONTROL
function setDEFCON(level){
    const el=document.getElementById('defcon-level');
    el.className='';
    el.classList.add(`defcon-${level}`);
    const labels={
        1:"1 (Nuclear War Imminent)",
        2:"2 (Next Step to War)",
        3:"3 (Increase in Force Readiness)",
        4:"4 (Above Normal Readiness)",
        5:"5 (Peace)"
    };
    el.textContent=labels[level];
}

// TICKER FETCH (Reuters + AP + SentDefender)
const tickerContent=document.getElementById('ticker-content');
const tickerSound=document.getElementById('alert-sound');
let lastAlerts=[];

async function fetchTicker(){
    try{
        const feeds=[
            'https://api.rss2json.com/v1/api.json?rss_url=https://rsshub.app/reuters/world',
            'https://api.rss2json.com/v1/api.json?rss_url=https://rsshub.app/apnews/topics/apf-topnews',
            'https://api.rss2json.com/v1/api.json?rss_url=https://rsshub.app/twitter/user/SentDefender'
        ];

        let items=[];

        for(const url of feeds){
            const res=await fetch(url);
            const data=await res.json();

            if(data.items){
                items=items.concat(
                    data.items.slice(0,5).map(i=>({
                        title:i.title,
                        link:i.link,
                        priority:i.title.toLowerCase().includes('breaking') ||
                                 i.title.toLowerCase().includes('alert') ||
                                 i.title.toLowerCase().includes('missile')
                    }))
                );
            }
        }

        const newText=items.map(i=>i.title).join('||');
        if(newText!==lastAlerts.map(a=>a.title).join('||') && lastAlerts.length>0){
            tickerSound.play();
        }
        lastAlerts=items;

        tickerContent.innerHTML='';
        items.forEach(i=>{
            const a=document.createElement('a');
            a.href=i.link;
            a.target='_blank';
            a.textContent=`⚠️ ${i.title} ⚠️`;
            a.style.color=i.priority?'red':'#ff0000';
            a.style.marginRight='40px';
            if(i.priority) a.style.animation='flash 1s infinite';
            tickerContent.appendChild(a);
        });

    }catch(e){
        console.error(e);
        tickerContent.textContent='Unable to load alerts.';
    }
}
fetchTicker();
setInterval(fetchTicker,30000);

// TICKER SCROLL (classic marquee)
let pos=window.innerWidth;
function scrollTicker(){
    pos--;
    if(pos<-tickerContent.offsetWidth) pos=window.innerWidth;
    tickerContent.style.transform=`translateX(${pos}px)`;
    requestAnimationFrame(scrollTicker);
}
scrollTicker();

// MISSILE LAUNCH ALERT
async function checkMissileLaunch(){
    try{
        const feeds=[
            "https://api.rss2json.com/v1/api.json?rss_url=https://rsshub.app/liveuamap/missile",
            "https://api.rss2json.com/v1/api.json?rss_url=https://rsshub.app/reuters/world"
        ];

        let detected=false;

        for(const url of feeds){
            const res=await fetch(url);
            const data=await res.json();
            if(!data.items) continue;

            for(const item of data.items.slice(0,5)){
                const t=item.title.toLowerCase();
                if(t.includes("missile") || t.includes("launched") || t.includes("ballistic")){
                    detected=true;
                }
            }
        }

        const alertBox=document.getElementById("missile-alert");

        if(detected){
            alertBox.style.display="block";
            document.getElementById("alert-sound").play();
        } else {
            alertBox.style.display="none";
        }

    }catch(e){
        console.error("Missile check error:",e);
    }
}
setInterval(checkMissileLaunch,45000);
checkMissileLaunch();

// WHITE HOUSE LIVE ALERT
setInterval(async ()=>{
    try{
        const res=await fetch('https://www.youtube.com/embed/live_stream?channel=WhiteHouse');
        const text=await res.text();
        if(text.includes('LIVE')){
            document.getElementById('live-sound').play();
            alert('⚠️ The White House is LIVE on YouTube! ⚠️');
        }
    }catch{}
},60000);

</script>
</body>
</html>
