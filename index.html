<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite OSINT War Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<style>
body { margin: 0; font-family: Arial, sans-serif; background: #050505; color: #00ff00; overflow-x: hidden; }
header {
    padding: 10px; text-align: center; background: #111; border-bottom: 2px solid #00ff00;
    font-size: 24px; font-weight: bold; position: sticky; top: 0; z-index: 1000;
}
.ticker {
    position: sticky; top: 50px; left: 0; width: 100%; background: #000; color: red;
    overflow: hidden; white-space: nowrap; z-index: 999; padding: 5px;
}
.ticker a { text-decoration: none; margin-right: 40px; }
@keyframes flash { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
.grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); grid-auto-rows: 40vh;
    gap: 8px; padding: 120px 8px 8px 8px; position: relative; /* top padding accounts for header + ticker */
}
.panel { border: 1px solid #00ff00; background: #000; position: relative; width: 100%; height: 100%; }
iframe { width: 100%; height: 100%; border: none; }
.fullscreen-btn {
    position: absolute; top: 5px; right: 5px; background: #111; color: #00ff00;
    border: 1px solid #00ff00; padding: 4px 8px; font-size: 12px; cursor: pointer; z-index: 5;
}
.dropbtn {
    background-color: #111; color: #00ff00; padding: 5px 10px; font-size: 14px;
    border: 1px solid #00ff00; cursor: pointer;
}
.dropdown {
    position: fixed; top: 90px; left: 10px; z-index: 1000;
}
.dropdown-content {
    display: none; position: absolute; background-color: #111; min-width: 160px;
    border: 1px solid #00ff00; z-index: 1000;
}
.dropdown-content a {
    color: #00ff00; padding: 5px 10px; text-decoration: none; display: block;
}
.dropdown-content a:hover { background-color: #222; }
.dropdown:hover .dropdown-content { display: block; }
</style>
</head>

<body>
<header>🛰️ Elite OSINT War Room</header>
